<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Discord Bot JSON Generator</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            background: white;
            border-radius: 15px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            overflow: hidden;
        }

        .header {
            background: linear-gradient(135deg, #5865f2 0%, #7289da 100%);
            color: white;
            padding: 30px;
            text-align: center;
        }

        .header h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
        }

        .header p {
            font-size: 1.1em;
            opacity: 0.9;
        }

        .main-content {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 0;
            min-height: 80vh;
        }

        .form-section {
            padding: 30px;
            background: #f8f9fa;
            overflow-y: auto;
            max-height: 80vh;
        }

        .preview-section {
            padding: 30px;
            background: #2c2f33;
            color: white;
            overflow-y: auto;
            max-height: 80vh;
        }

        .section-title {
            font-size: 1.5em;
            margin-bottom: 20px;
            color: #333;
            border-bottom: 3px solid #5865f2;
            padding-bottom: 10px;
        }

        .preview-section .section-title {
            color: white;
            border-bottom-color: #7289da;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #333;
        }

        .form-group input,
        .form-group textarea,
        .form-group select {
            width: 100%;
            padding: 12px;
            border: 2px solid #e1e5e9;
            border-radius: 8px;
            font-size: 14px;
            transition: border-color 0.3s ease;
        }

        .form-group input:focus,
        .form-group textarea:focus,
        .form-group select:focus {
            outline: none;
            border-color: #5865f2;
        }

        .form-group textarea {
            resize: vertical;
            min-height: 100px;
        }

        .command-selector {
            background: #5865f2;
            color: white;
            padding: 15px;
            margin-bottom: 20px;
            border-radius: 8px;
        }

        .command-selector select {
            background: white;
            color: #333;
            border: none;
            padding: 10px;
            border-radius: 5px;
            font-size: 16px;
            width: 100%;
        }

        .btn {
            background: #5865f2;
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
            transition: background-color 0.3s ease;
            margin: 5px;
        }

        .btn:hover {
            background: #4752c4;
        }

        .btn-secondary {
            background: #6c757d;
        }

        .btn-secondary:hover {
            background: #5a6268;
        }

        .btn-danger {
            background: #dc3545;
        }

        .btn-danger:hover {
            background: #c82333;
        }

        .btn-success {
            background: #28a745;
        }

        .btn-success:hover {
            background: #218838;
        }

        .fields-container {
            border: 2px dashed #dee2e6;
            border-radius: 8px;
            padding: 20px;
            margin-top: 10px;
        }

        .field-item {
            background: white;
            border: 1px solid #dee2e6;
            border-radius: 8px;
            padding: 15px;
            margin-bottom: 15px;
            position: relative;
        }

        .field-item .remove-field {
            position: absolute;
            top: 10px;
            right: 10px;
            background: #dc3545;
            color: white;
            border: none;
            border-radius: 50%;
            width: 25px;
            height: 25px;
            cursor: pointer;
            font-size: 12px;
        }

        .json-output {
            background: #23272a;
            border: 1px solid #40444b;
            border-radius: 8px;
            padding: 20px;
            font-family: 'Courier New', monospace;
            font-size: 13px;
            line-height: 1.4;
            white-space: pre-wrap;
            word-wrap: break-word;
            max-height: 400px;
            overflow-y: auto;
        }

        .placeholders-info {
            background: #36393f;
            border-radius: 8px;
            padding: 15px;
            margin-bottom: 20px;
            font-size: 13px;
        }

        .placeholders-info h4 {
            color: #7289da;
            margin-bottom: 10px;
        }

        .placeholder-item {
            background: #2c2f33;
            padding: 5px 8px;
            border-radius: 4px;
            margin: 2px;
            display: inline-block;
            font-family: monospace;
            font-size: 12px;
            cursor: pointer;
            transition: background-color 0.2s ease;
        }

        .placeholder-item:hover {
            background: #5865f2;
        }

        .color-preview {
            width: 30px;
            height: 30px;
            border-radius: 4px;
            border: 2px solid #dee2e6;
            display: inline-block;
            vertical-align: middle;
            margin-left: 10px;
        }

        .embed-preview {
            background: #36393f;
            border-left: 4px solid #5865f2;
            border-radius: 4px;
            padding: 16px;
            margin-top: 20px;
            font-size: 14px;
        }

        .embed-title {
            font-size: 16px;
            font-weight: 600;
            margin-bottom: 8px;
            color: #ffffff;
        }

        .embed-description {
            color: #dcddde;
            line-height: 1.375;
            margin-bottom: 12px;
        }

        .embed-field {
            margin-bottom: 8px;
        }

        .embed-field-name {
            font-size: 14px;
            font-weight: 600;
            color: #ffffff;
            margin-bottom: 2px;
        }

        .embed-field-value {
            color: #dcddde;
            font-size: 14px;
        }

        .embed-footer {
            color: #72767d;
            font-size: 12px;
            margin-top: 8px;
        }

        .inline-fields {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 8px;
        }

        @media (max-width: 768px) {
            .main-content {
                grid-template-columns: 1fr;
            }
            
            .form-section,
            .preview-section {
                max-height: none;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🤖 Discord Bot JSON Generator</h1>
            <p>Create beautiful embed messages for your Discord bot commands</p>
        </div>

        <div class="main-content">
            <div class="form-section">
                <h2 class="section-title">📝 Message Builder</h2>
                
                <div class="command-selector">
                    <label for="commandType">Select Command Type:</label>
                    <select id="commandType" onchange="updatePlaceholders()">
                        <option value="welcome">Welcome Message</option>
                        <option value="sendMessage">Send Message</option>
                        <option value="sendNews">Send News</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="title">Title *</label>
                    <input type="text" id="title" placeholder="Enter embed title" oninput="updatePreview()">
                </div>

                <div class="form-group">
                    <label for="description">Description *</label>
                    <textarea id="description" placeholder="Enter embed description" oninput="updatePreview()"></textarea>
                </div>

                <div class="form-group">
                    <label for="color">Color (hex)</label>
                    <input type="color" id="colorPicker" onchange="updateColorFromPicker()" style="width: 50px; height: 40px; padding: 0; border: none;">
                    <input type="text" id="color" placeholder="#5865f2 or 432F20" oninput="updatePreview()" style="width: calc(100% - 60px); margin-left: 10px;">
                    <div class="color-preview" id="colorPreview"></div>
                </div>

                <div class="form-group">
                    <label>Fields</label>
                    <div class="fields-container" id="fieldsContainer">
                        <button type="button" class="btn" onclick="addField()">+ Add Field</button>
                    </div>
                </div>

                <div class="form-group">
                    <label for="imageUrl">Image URL</label>
                    <input type="text" id="imageUrl" placeholder="https://example.com/image.png" oninput="updatePreview()">
                </div>

                <div class="form-group">
                    <label for="thumbnailUrl">Thumbnail URL</label>
                    <input type="text" id="thumbnailUrl" placeholder="https://example.com/thumbnail.png" oninput="updatePreview()">
                </div>

                <div class="form-group">
                    <label for="footerText">Footer Text</label>
                    <input type="text" id="footerText" placeholder="Footer text" oninput="updatePreview()">
                </div>

                <div class="form-group">
                    <label for="footerIcon">Footer Icon URL</label>
                    <input type="text" id="footerIcon" placeholder="https://example.com/icon.png" oninput="updatePreview()">
                </div>

                <div style="text-align: center; margin-top: 30px;">
                    <button class="btn btn-success" onclick="copyJSON()">📋 Copy JSON</button>
                    <button class="btn btn-secondary" onclick="clearForm()">🗑️ Clear All</button>
                    <button class="btn" onclick="loadExample()">📄 Load Example</button>
                </div>
            </div>

            <div class="preview-section">
                <h2 class="section-title">👀 Live Preview</h2>
                
                <div class="placeholders-info" id="placeholdersInfo">
                    <h4>Available Placeholders:</h4>
                    <div id="placeholdersList"></div>
                </div>

                <div class="embed-preview" id="embedPreview">
                    <div class="embed-title" id="previewTitle">Sample Title</div>
                    <div class="embed-description" id="previewDescription">Sample description text</div>
                    <div id="previewFields"></div>
                    <div class="embed-footer" id="previewFooter"></div>
                </div>

                <h3 style="margin-top: 30px; margin-bottom: 15px; color: #7289da;">Generated JSON:</h3>
                <div class="json-output" id="jsonOutput"></div>
            </div>
        </div>
    </div>

    <script>
        let fieldCounter = 0;

        const placeholders = {
            welcome: [
                '{guild_name}', '{member_name}', '{member_mention}', 
                '{member_avatar}', '{bot_avatar}', '{member_count}', '{trademark}'
            ],
            sendMessage: [
                '{guild_name}', '{member_name}', '{member_mention}', 
                '{bot_avatar}', '{trademark}'
            ],
            sendNews: [
                '{guild_name}', '{member_name}', '{member_mention}', '{member_avatar}',
                '{recipient_name}', '{recipient_mention}', '{recipient_avatar}',
                '{bot_avatar}', '{member_count}', '{trademark}'
            ]
        };

        function updatePlaceholders() {
            const commandType = document.getElementById('commandType').value;
            const placeholdersList = document.getElementById('placeholdersList');
            
            placeholdersList.innerHTML = '';
            placeholders[commandType].forEach(placeholder => {
                const span = document.createElement('span');
                span.className = 'placeholder-item';
                span.textContent = placeholder;
                span.onclick = () => insertPlaceholder(placeholder);
                placeholdersList.appendChild(span);
            });
        }

        function insertPlaceholder(placeholder) {
            const activeElement = document.activeElement;
            if (activeElement && (activeElement.tagName === 'INPUT' || activeElement.tagName === 'TEXTAREA')) {
                const start = activeElement.selectionStart;
                const end = activeElement.selectionEnd;
                const value = activeElement.value;
                activeElement.value = value.substring(0, start) + placeholder + value.substring(end);
                activeElement.focus();
                activeElement.setSelectionRange(start + placeholder.length, start + placeholder.length);
                updatePreview();
            }
        }

        function addField() {
            fieldCounter++;
            const fieldsContainer = document.getElementById('fieldsContainer');
            const fieldDiv = document.createElement('div');
            fieldDiv.className = 'field-item';
            fieldDiv.innerHTML = `
                <button type="button" class="remove-field" onclick="removeField(this)">×</button>
                <div style="margin-bottom: 10px;">
                    <label>Field Name:</label>
                    <input type="text" class="field-name" placeholder="Field name" oninput="updatePreview()">
                </div>
                <div style="margin-bottom: 10px;">
                    <label>Field Value:</label>
                    <textarea class="field-value" placeholder="Field value" oninput="updatePreview()"></textarea>
                </div>
                <div>
                    <label>
                        <input type="checkbox" class="field-inline" onchange="updatePreview()"> Inline
                    </label>
                </div>
            `;
            fieldsContainer.insertBefore(fieldDiv, fieldsContainer.lastElementChild);
            updatePreview();
        }

        function removeField(button) {
            button.parentElement.remove();
            updatePreview();
        }

        function updateColorFromPicker() {
            const colorPicker = document.getElementById('colorPicker');
            const colorInput = document.getElementById('color');
            colorInput.value = colorPicker.value;
            updatePreview();
        }

        function updatePreview() {
            const title = document.getElementById('title').value || 'Sample Title';
            const description = document.getElementById('description').value || 'Sample description text';
            const color = document.getElementById('color').value;
            const footerText = document.getElementById('footerText').value;

            // Update preview
            document.getElementById('previewTitle').textContent = title;
            document.getElementById('previewDescription').textContent = description;

            // Update color preview
            const embedPreview = document.getElementById('embedPreview');
            const colorPreview = document.getElementById('colorPreview');
            
            if (color) {
                let colorValue = color;
                if (color.startsWith('#')) {
                    colorValue = color;
                } else if (color.length === 6 && /^[0-9A-Fa-f]+$/.test(color)) {
                    colorValue = '#' + color;
                } else {
                    colorValue = '#5865f2';
                }
                embedPreview.style.borderLeftColor = colorValue;
                colorPreview.style.backgroundColor = colorValue;
            } else {
                embedPreview.style.borderLeftColor = '#5865f2';
                colorPreview.style.backgroundColor = '#5865f2';
            }

            // Update fields
            const fieldsContainer = document.getElementById('previewFields');
            fieldsContainer.innerHTML = '';
            
            const fieldItems = document.querySelectorAll('.field-item');
            const inlineFields = [];
            const blockFields = [];

            fieldItems.forEach(item => {
                const name = item.querySelector('.field-name').value;
                const value = item.querySelector('.field-value').value;
                const inline = item.querySelector('.field-inline').checked;

                if (name && value) {
                    const fieldObj = { name, value, inline };
                    if (inline) {
                        inlineFields.push(fieldObj);
                    } else {
                        blockFields.push(fieldObj);
                    }
                }
            });

            // Render block fields
            blockFields.forEach(field => {
                const fieldDiv = document.createElement('div');
                fieldDiv.className = 'embed-field';
                fieldDiv.innerHTML = `
                    <div class="embed-field-name">${field.name}</div>
                    <div class="embed-field-value">${field.value}</div>
                `;
                fieldsContainer.appendChild(fieldDiv);
            });

            // Render inline fields
            if (inlineFields.length > 0) {
                const inlineContainer = document.createElement('div');
                inlineContainer.className = 'inline-fields';
                inlineFields.forEach(field => {
                    const fieldDiv = document.createElement('div');
                    fieldDiv.className = 'embed-field';
                    fieldDiv.innerHTML = `
                        <div class="embed-field-name">${field.name}</div>
                        <div class="embed-field-value">${field.value}</div>
                    `;
                    inlineContainer.appendChild(fieldDiv);
                });
                fieldsContainer.appendChild(inlineContainer);
            }

            // Update footer
            const footerElement = document.getElementById('previewFooter');
            if (footerText) {
                footerElement.textContent = footerText;
                footerElement.style.display = 'block';
            } else {
                footerElement.style.display = 'none';
            }

            // Generate JSON
            generateJSON();
        }

        function generateJSON() {
            const json = {
                title: document.getElementById('title').value || '',
                description: document.getElementById('description').value || ''
            };

            const color = document.getElementById('color').value;
            if (color) {
                json.color = color.startsWith('#') ? color : '#' + color;
            }

            // Add fields
            const fieldItems = document.querySelectorAll('.field-item');
            const fields = [];
            fieldItems.forEach(item => {
                const name = item.querySelector('.field-name').value;
                const value = item.querySelector('.field-value').value;
                const inline = item.querySelector('.field-inline').checked;

                if (name && value) {
                    fields.push({ name, value, inline });
                }
            });

            if (fields.length > 0) {
                json.fields = fields;
            }

            const imageUrl = document.getElementById('imageUrl').value;
            if (imageUrl) {
                json.image = { url: imageUrl };
            }

            const thumbnailUrl = document.getElementById('thumbnailUrl').value;
            if (thumbnailUrl) {
                json.thumbnail = { url: thumbnailUrl };
            }

            const footerText = document.getElementById('footerText').value;
            const footerIcon = document.getElementById('footerIcon').value;
            if (footerText || footerIcon) {
                json.footer = {};
                if (footerText) json.footer.text = footerText;
                if (footerIcon) json.footer.icon_url = footerIcon;
            }

            document.getElementById('jsonOutput').textContent = JSON.stringify(json, null, 2);
        }

        function copyJSON() {
            const jsonText = document.getElementById('jsonOutput').textContent;
            navigator.clipboard.writeText(jsonText).then(() => {
                alert('JSON copied to clipboard!');
            });
        }

        function clearForm() {
            if (confirm('Are you sure you want to clear all fields?')) {
                document.getElementById('title').value = '';
                document.getElementById('description').value = '';
                document.getElementById('color').value = '';
                document.getElementById('imageUrl').value = '';
                document.getElementById('thumbnailUrl').value = '';
                document.getElementById('footerText').value = '';
                document.getElementById('footerIcon').value = '';
                
                const fieldsContainer = document.getElementById('fieldsContainer');
                const fieldItems = fieldsContainer.querySelectorAll('.field-item');
                fieldItems.forEach(item => item.remove());
                
                updatePreview();
            }
        }

        function loadExample() {
            document.getElementById('title').value = 'Welcome to {guild_name}!';
            document.getElementById('description').value = 'Hey {member_mention}! 🎉\n\nWe\'re super excited to have you here!\n\nCheck out the channels, introduce yourself, and have fun!';
            document.getElementById('color').value = '#5865f2';
            document.getElementById('thumbnailUrl').value = '{member_avatar}';
            document.getElementById('footerText').value = 'Member #{member_count} • {trademark}';
            
            // Clear existing fields
            const fieldsContainer = document.getElementById('fieldsContainer');
            const fieldItems = fieldsContainer.querySelectorAll('.field-item');
            fieldItems.forEach(item => item.remove());
            
            // Add example field
            addField();
            const fieldItem = document.querySelector('.field-item');
            fieldItem.querySelector('.field-name').value = '🎮 Getting Started';
            fieldItem.querySelector('.field-value').value = 'Check out <#123456789> for rules and <#987654321> for announcements!';
            fieldItem.querySelector('.field-inline').checked = false;
            
            updatePreview();
        }

        // Initialize
        updatePlaceholders();
        updatePreview();
    </script>
</body>
</html>
